<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — DDEV Coder Workspaces</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0e0e10;
      color: #e0e0e0;
      line-height: 1.7;
    }

    nav {
      padding: 1rem 2rem;
      border-bottom: 1px solid #1c1c1e;
    }

    nav a {
      color: #a78bfa;
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a:hover { text-decoration: underline; }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; letter-spacing: -0.02em; }
    h2 { font-size: 1.35rem; font-weight: 600; margin: 2.5rem 0 0.75rem; color: #e8e8e8; }
    h3 { font-size: 1.1rem; font-weight: 600; margin: 1.75rem 0 0.5rem; color: #ddd; }

    p { margin-bottom: 1rem; color: #ccc; }

    a { color: #a78bfa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    ul, ol { margin: 0 0 1rem 1.5rem; color: #ccc; }
    li { margin-bottom: 0.35rem; }

    code {
      background: #1a1a1f;
      border: 1px solid #2a2a30;
      padding: 0.15em 0.45em;
      border-radius: 4px;
      font-family: 'SF Mono', Consolas, 'Courier New', monospace;
      font-size: 0.87em;
      color: #c4b5fd;
    }

    pre {
      background: #111115;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.9rem;
      color: #c9d1d9;
    }

    hr {
      border: none;
      border-top: 1px solid #1c1c1e;
      margin: 2rem 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
    }

    th {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 2px solid #2a2a30;
      color: #999;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #1c1c1e;
      color: #ccc;
    }

    strong { color: #e8e8e8; }

    blockquote {
      border-left: 3px solid #3b2f6e;
      padding-left: 1rem;
      color: #999;
      margin-bottom: 1rem;
    }

    img { max-width: 100%; }
  </style>
</head>
<body>
  <nav>
    <a href="/">← DDEV Coder Workspaces</a>
  </nav>
  <main>
    {{ content }}
  </main>
</body>
</html>
